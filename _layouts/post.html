---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <p class="meta">
    {{ page.date | date: "%Y-%m-%d" }}
    {% if page.categories %}
      · 分类：{{ page.categories | join: " / " }}
    {% endif %}
  </p>

  {% if page.tags %}
  <p>
    {% for tag in page.tags %}
      <span class="tag">#{{ tag }}</span>
    {% endfor %}
  </p>
  {% endif %}

  <hr>

  {{ content }}
</article>
